# scheduler.yml - GitHub Actions workflow for scheduling inverter control tasks based on time and user input.
name: Inverter Control Scheduler

on:
  workflow_dispatch:
    inputs:
      action_to_run:
        description: 'Select Command'
        required: true
        default: 'read-status'
        type: choice
        options:
          - read-status
          - set-solar
          - set-sbu
      ignore_date_skip:
        description: 'Override date restriction (23rd-26th)?'
        type: boolean
        default: true

  schedule:
    - cron: '10,20,30 23 * * *'  # Solar Logic (Early Morning: 06:10, 06:20, 06:30 local time)
    - cron: '0,10,20 2 * * *'    # Solar Logic (Late Morning: 09:00, 09:10, 09:20 local time)
    - cron: '45 10 * * *'        # SBU Logic
    - cron: '0,15 11 * * *'      # SBU Logic
    - cron: '0 */2 * * *'        # Status Check

jobs:
  execute-command:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Resolve Context
        id: ctx
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "action=${{ github.event.inputs.action_to_run }}" >> $GITHUB_OUTPUT
            echo "force=${{ github.event.inputs.ignore_date_skip }}" >> $GITHUB_OUTPUT
          else
            echo "force=false" >> $GITHUB_OUTPUT
            CRON="${{ github.event.schedule }}"
            if [[ "$CRON" == "10,20,30 23 * * *" || "$CRON" == "0,10,20 2 * * *" ]]; then
              echo "action=set-solar" >> $GITHUB_OUTPUT
            elif [[ "$CRON" == "45 10 * * *" || "$CRON" == "0,15 11 * * *" ]]; then
              echo "action=set-sbu" >> $GITHUB_OUTPUT
            else
              echo "action=read-status" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 📅 Date Check
        id: gate
        run: |
          DAY_STR=$(TZ="Asia/Bangkok" date +'%d')
          DAY=$((10#$DAY_STR))
          HOUR_STR=$(TZ="Asia/Bangkok" date +'%H')
          HOUR=$((10#$HOUR_STR))
          ACTION="${{ steps.ctx.outputs.action }}"
          FORCE="${{ steps.ctx.outputs.force }}"
          
          if [[ "$ACTION" == "set-solar" && "$FORCE" == "false" ]]; then
            if [[ $DAY -ge 23 && $DAY -le 26 ]]; then
              if [[ $HOUR -ne 9 ]]; then
                echo "proceed=false" >> $GITHUB_OUTPUT
                echo "Skipping early scheduled Solar task for billing date: $DAY_STR (Hour: $HOUR_STR)"
              else
                echo "proceed=true" >> $GITHUB_OUTPUT
              fi
            else
              if [[ $HOUR -ne 6 ]]; then
                echo "proceed=false" >> $GITHUB_OUTPUT
                echo "Skipping late scheduled Solar task for normal date: $DAY_STR (Hour: $HOUR_STR)"
              else
                echo "proceed=true" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "proceed=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run
        if: steps.gate.outputs.proceed == 'true'
        env:
          INVERTER_TOKEN: ${{ secrets.INVERTER_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          pip install requests
          python inverter_control.py ${{ steps.ctx.outputs.action }}